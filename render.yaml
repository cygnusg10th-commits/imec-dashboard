services:
  - type: web
    name: imec-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: COMTRADE_API_KEY
        sync: false
